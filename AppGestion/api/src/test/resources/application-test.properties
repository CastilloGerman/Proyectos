# Perfil activado con @ActiveProfiles("test") — BD en memoria H2; sin Flyway (migraciones pensadas para PostgreSQL).
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# JWT (perfil test permite valores de desarrollo; mínimo 32 caracteres fuera de local/test en JwtService)
app.jwt.secret=test-secret-at-least-32-characters-long!!
app.jwt.expiration-ms=86400000
app.jwt.issuer=appgestion-api-test

# Email OAuth / cifrado (bean presente; clave mínima 16 caracteres si se usa cifrado)
app.email.token-encryption-key=test-email-token-key-min-32-chars!!

# Suscripción: no bloquear arranque de tests
app.subscription.skip-check=true
