spring:
  # Para desarrollo local: --spring.profiles.active=local (ver spring-boot-maven-plugin en pom.xml)
  # Producción: SPRING_PROFILES_ACTIVE=prod y variables JWT_SECRET, CORS, Stripe, etc.
  application:
    name: appgestion-api

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 55MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    # Local: sin PGHOST → localhost:5433/appgestion. Railway u otros PaaS: PG* del plugin Postgres o SPRING_DATASOURCE_URL.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5433}/${PGDATABASE:appgestion}}
    username: ${PGUSER:${DB_USERNAME:postgres}}
    password: ${PGPASSWORD:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  flyway:
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        '[format_sql]': true
        '[default_schema]': public
    open-in-view: false

  web:
    error:
      # Spring Boot 4: usar spring.web.error en lugar de server.error (deprecado).
      # En prod (perfil prod) se sobrescribe a never.
      include-message: on_param

server:
  # Railway (y similares) inyectan PORT; local sigue usando 8081 por defecto.
  port: ${PORT:8081}

# Stripe: en prod deben venir de variables de entorno (validado en StripeConfig)
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  price-id-monthly: ${STRIPE_PRICE_MONTHLY:}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:4200/subscription/success}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost:4200/subscription/cancel}
  portal-return-url: ${STRIPE_PORTAL_RETURN_URL:http://localhost:4200/dashboard}

app:
  api:
    # Si es false, las respuestas 500 genéricas no incluyen el mensaje interno de la excepción.
    expose-internal-error-message: ${APP_API_EXPOSE_INTERNAL_ERRORS:false}
  support:
    # Buzón de soporte (solo servidor). Los usuarios envían vía POST; no exponer este valor en el front.
    inbox-email: ${SUPPORT_INBOX_EMAIL:castillogerman98@hotmail.com}
  subscription:
    # Por defecto exige suscripción para escritura (seguro). Perfil local la desactiva.
    skip-check: false
  # Nombre que verá el usuario en la app de autenticación (QR TOTP).
  totp:
    issuer: ${TOTP_ISSUER:AppGestion}
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  jwt:
    # Obligatorio si no usas perfil local (ver bloque --- local abajo)
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    issuer: appgestion-api
  security:
    auth-rate-limit:
      enabled: true
      capacity: 30
      refill-minutes: 15
  # Sesiones JWT persistidas (dispositivos): purga automática de filas muy antiguas.
  sessions:
    cleanup:
      enabled: ${SESSIONS_CLEANUP_ENABLED:true}
      # Borra registros cuyo expiresAt es anterior a (ahora - N días). Mínimo efectivo: 1.
      retention-days: ${SESSIONS_CLEANUP_RETENTION_DAYS:30}
  # Email: outbox en BD + worker; modo system = Resend. En producción configura SPF/DKIM/DMARC del dominio de envío según el proveedor.
  email:
    # Clave para cifrar tokens OAuth (obligatoria si usas Gmail/Outlook; en local el perfil define un valor por defecto)
    token-encryption-key: ${APP_EMAIL_TOKEN_SECRET:}
    worker-delay-ms: 3000
    oauth-pending-cleanup-ms: 600000
    system-from: ${APP_EMAIL_SYSTEM_FROM:Noemi <onboarding@resend.dev>}
    resend:
      api-key: ${RESEND_API_KEY:}
      webhook-secret: ${RESEND_WEBHOOK_SECRET:}
    google:
      client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
      client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8081/auth/email/oauth/google/callback}
    microsoft:
      client-id: ${MICROSOFT_OAUTH_CLIENT_ID:}
      client-secret: ${MICROSOFT_OAUTH_CLIENT_SECRET:}
      redirect-uri: ${MICROSOFT_OAUTH_REDIRECT_URI:http://localhost:8081/auth/email/oauth/microsoft/callback}
      tenant: ${MICROSOFT_OAUTH_TENANT:common}
  audit:
    access:
      # Último octeto IPv4 a 0 (o equivalente IPv6); recomendado en UE.
      anonymize-ip: ${AUDIT_ANONYMIZE_IP:true}
      retention-days: ${AUDIT_ACCESS_RETENTION_DAYS:365}
      cleanup:
        enabled: ${AUDIT_ACCESS_CLEANUP_ENABLED:true}

logging:
  level:
    '[com.appgestion]': INFO
    '[org.springframework.web]': INFO
    '[org.hibernate.SQL]': WARN

---
spring:
  config:
    activate:
      on-profile: local
  jpa:
    hibernate:
      ddl-auto: update
app:
  subscription:
    skip-check: true
  # Pruebas desde el móvil vía http://<IP-LAN>:4200 (Angular ya escucha en 0.0.0.0)
  cors:
    allowed-origin-patterns: "http://*:4200,http://127.0.0.1:4200"
  jwt:
    secret: ${JWT_SECRET:local-dev-only-minimum-thirty-two-characters-long-for-hs256}
  email:
    token-encryption-key: ${APP_EMAIL_TOKEN_SECRET:local-dev-email-token-key-min-32-chars-for-aes-256}
  security:
    auth-rate-limit:
      enabled: true
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_local_placeholder_replace_with_real_key}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_local_placeholder_replace_with_real_secret}
  price-id-monthly: ${STRIPE_PRICE_MONTHLY:price_xxx}
logging:
  level:
    '[com.appgestion]': DEBUG
    '[org.springframework.web]': INFO
    '[org.hibernate.SQL]': DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate
  web:
    error:
      include-message: never
app:
  subscription:
    skip-check: false
logging:
  level:
    '[com.appgestion]': INFO
    '[org.springframework.web]': WARN
    '[org.hibernate.SQL]': WARN
