# Railway: Root Directory = AppGestion (este archivo + pom padre).
# El packager de Railway hace COPY sobre /app/target; en monorepo el JAR queda en api/target/, así que lo copiamos a target/.
# Si el root del repo en Railway es la raíz "Proyectos", usa: mkdir -p target && cp AppGestion/api/target/appgestion-api.jar target/

[build]
buildCommand = "mvn -B -DskipTests package && mkdir -p target && cp api/target/appgestion-api.jar target/appgestion-api.jar"

[deploy]
startCommand = "java -jar target/appgestion-api.jar"
