# Root Directory del servicio frontend en Railway: carpeta "frontend" (o AppGestion/frontend según el repo).
# Sirve el build estatico en el puerto que Railway inyecta ($PORT).

[build]
buildCommand = "npm ci && npm run build"

[deploy]
# Escuchar en todas las interfaces; si solo escucha en 127.0.0.1 Railway muestra "Application failed to respond".
startCommand = "npx --yes serve@14 dist/appgestion-frontend/browser -s -l tcp://0.0.0.0:${PORT}"
